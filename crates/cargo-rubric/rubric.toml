# Requirements for the cargo-bind CLI.
#
# Subcommands: gen, check, matrix, seal. Walker backs all of
# them; CLI plumbing is thin.

[meta]
version = 1

# --- gen ---

[req.gen.render_marker_module]
description = "Render the marker module from bind.toml to the configured output path, with deterministic output ordering"

[req.gen.detect_drift]
description = "In --check mode, exit non-zero when the on-disk marker file differs from what would be generated"

# --- check ---

[req.check.detect_unimplemented]
description = "Report every requirement that has no `satisfies` annotation pointing at it"

[req.check.detect_unverified]
description = "Report every requirement that has no `verifies` annotation pointing at it"

[req.check.detect_orphan]
description = "Report every annotation whose label path is not present in the manifest"

[req.check.nonzero_on_gaps]
description = "Exit non-zero when any gap category is non-empty, so CI can gate on `cargo bind check`"

# --- matrix ---

[req.matrix.render_markdown]
description = "Render a markdown traceability table with stable FNV-1a IDs and annotation file:line cells, one row per requirement"

# walker reqs moved to bind-core (where walker now lives)

[req.seal.update_lockfile]
description = "Walk every annotated site, compute function body hash, write rubric.lock — prune entries for requirements that no longer exist in the manifest, idempotent across repeated invocations"

[req.seal.off_is_explicit]
description = "When a lockfile entry has value `off`, check surfaces it as an audit note so reviewers see every opt-out in CI output"
