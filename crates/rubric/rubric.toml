# Requirements for the `bind` proc-macro crate.
#
# Proc-macro crates cannot use their own exports internally, so the
# SOURCE of this crate cannot carry `#[bind(satisfies = ...)]`. Each
# requirement declares a `satisfied_by` path as an explicit assertion;
# the tool trusts these without hash-based drift tracking. Tests in
# sibling crates (bind-nostd-test) verify macro behavior.

[meta]
version = 1

[req.macro.validates_path_at_compile_time]
description = "Emit a path-typed const that forces name resolution against the generated marker module, so typos surface as `cargo check` errors"
satisfied_by = ["bind::const_check"]
verified_by = ["bind_nostd_test::attribute_annotated"]

[req.macro.verifies_requirement_exists]
description = "At expand time, load bind.toml from CARGO_MANIFEST_DIR and compile_error when the referenced label path has no matching requirement"
satisfied_by = ["bind::expand_attr"]
verified_by = ["bind_nostd_test::attribute_annotated"]

[req.macro.silent_no_op_without_manifest]
description = "When no bind.toml is present in the consuming crate, the macro emits only the path const and does not error — a crate that depends on `bind` transitively is not forced to adopt the tool"
satisfied_by = ["bind::load_manifest_src"]
verified_by = ["bind_nostd_test::attribute_annotated"]

[req.macro.multi_path_annotations]
description = "Both `#[bind(satisfies = A, B)]` and `bind_at!(verifies = A, B)` accept comma-delimited path lists and emit one marker per path"
satisfied_by = ["bind::parse_args"]
verified_by = ["bind_nostd_test::multi_satisfies"]

[req.macro.block_scope_via_bind_at]
description = "The function-like form is named `bind_at!` (distinct from the attribute export name) and expands to a `let _: path = path;` binding at statement position"
satisfied_by = ["bind::bind_at", "bind::let_binding"]
verified_by = ["bind_nostd_test::block_annotated"]

[req.macro.no_std_compatible]
description = "Macro expansions emit only core-level syntax (no `std` imports, no allocation, no formatting at runtime) so consuming crates with `#![no_std]` can adopt bind without configuration"
satisfied_by = ["bind::const_check", "bind::let_binding"]
verified_by = ["bind_nostd_test::attribute_annotated", "bind_nostd_test::block_annotated"]

[req.macro.emits_rustdoc_subsection]
description = "Emit a `#[doc = ...]` attribute rendering a `# Implements` / `# Verifies` subsection with the requirement's description, so cargo doc surfaces traceability without source prose duplication"
satisfied_by = ["bind::inject_doc_attrs", "bind::render_doc_body"]
verified_by = ["cargo doc output under target/doc/ contains `# Implements` headings on annotated items"]

# Note: macro-time seal enforcement and `off` opt-out surfacing are not
# implemented by this crate. The design pivoted to `cargo rubric check` /
# `cargo rubric seal` handling both concerns at CLI time (stable Rust lacks
# the Span file info the macro would need). See cargo-bind/bind.toml for
# the corresponding implemented requirements.
