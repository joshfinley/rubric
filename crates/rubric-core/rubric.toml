# Requirements for bind-core — the shared data model and parsers.
#
# bind-core cannot depend on the `bind` proc-macro crate (dependency
# cycle), so SOURCE items carry `// bind: satisfies = …` line comments
# instead of `#[bind(...)]` attributes. The walker scans both forms.
# Tests use the attribute form via `bind` as a dev-dependency.

[meta]
version = 1

[req.toml_lite.parses_section_headers]
description = "Recognise `[a.b.c]` dotted section headers and attribute following key-value pairs to the nested path"

[req.toml_lite.parses_basic_strings]
description = "Decode basic string literals with the `\\n`, `\\t`, `\\\\`, `\\\"`, `\\0` escape sequences supported by the TOML spec subset we need"

[req.toml_lite.parses_string_arrays]
description = "Recognise arrays of basic strings, including arrays that span multiple source lines"

[req.toml_lite.parses_integers]
description = "Recognise decimal integer values, optionally with `_` digit separators"

[req.toml_lite.rejects_unterminated_strings]
description = "Surface a line-numbered error when a string literal is not closed before EOF or end-of-line"

[req.manifest.builds_from_entries]
description = "Group parsed TOML entries by section and materialise a typed Manifest record with requirement bodies"

[req.manifest.requires_description]
description = "Reject a requirement section that omits the `description` key — every req must carry authoritative prose"

[req.manifest.preserves_label_path]
description = "Map `[req.a.b.c]` to a Requirement whose label_path is [a, b, c], preserving ordering and depth"

[req.fnv.matches_reference_vectors]
description = "FNV-1a 64-bit output matches the published reference vector for the input byte string `a`"

[req.fnv.is_deterministic]
description = "Identical input bytes produce identical output across calls and across builds"

[req.codegen.renders_module_tree]
description = "Produce a nested `pub mod ... { pub struct <leaf>; }` tree that mirrors the manifest's label-path hierarchy"

[req.codegen.handles_leaf_and_parent_collision]
description = "A label path that is both a terminal requirement and a parent of other requirements (e.g. `[req.x]` alongside `[req.x.y]`) renders both a marker struct and a nested module"

[req.hash.body_scheme]
description = "Compute a deterministic FNV-1a hash over a function body's token stream with whitespace, line comments, block comments, and doc attributes stripped — the default `body:` scheme for seal values"

[req.lockfile.parse_and_write]
description = "Parse and serialise bind.lock entries keyed by (requirement label path, source item path); round-trip preserves formatting of a generated lockfile"

# --- walker & resolver ---

[req.walker.find_attribute_form]
description = "Recognise the `#[bind(...)]` attribute form, including path-prefixed invocations like `#[bind::bind(...)]`"

[req.walker.ignore_strings_and_comments]
description = "Do not match bind-shaped patterns that occur inside string literals or comments"

[req.walker.multi_path_annotations]
description = "Accept comma-delimited path lists in a single annotation and emit one edge per path"

[req.walker.comment_form_annotations]
description = "Recognise `// bind: <direction> = <path>, …` line-comment annotations so crates that can't consume the proc-macros (cycle, FFI) can still be tracked"

[req.resolver.tracks_item_path]
description = "Record the rustdoc-convention path of the enclosing fn or item for each annotation so seal entries in rubric.lock can key by item path in addition to requirement label"
