# Requirements for rubric's pure verification core. Rubric tracks itself
# here. The seal mechanism and the oracle are the two things the README's
# safety-critical claims rest on.

# --- The seal ---

[req.SEAL-HASH]
kind = "functional"
statement = "Every seal is an FNV-1a 64 hash of its normalized input"

[req.SEAL-FORMAT]
kind = "functional"
statement = "A seal renders as a scheme tag joined to sixteen hex digits"

[req.SEAL-BODY]
kind = "functional"
statement = "Identical token sequences seal identically; any token change changes the seal"

[req.SEAL-STMT]
kind = "functional"
statement = "A statement seal ignores whitespace but breaks on rewording"

[req.SEAL-SIG]
kind = "functional"
statement = "A signature seal and a full seal carry the sig and full scheme tags, and a full seal breaks on either a signature or a body change"

[req.SEAL-FILE]
kind = "functional"
statement = "A file seal is an FNV-1a 64 hash of raw bytes under the file scheme"

# --- Pointcuts ---

[req.POINTCUT-PARSE]
kind = "functional"
statement = "A cover designator parses into a visibility predicate, an optional kind filter, and a module scope, and rejects malformed input"

[req.POINTCUT-MATCH]
kind = "functional"
statement = "A pointcut matches an item when its visibility, kind, and module scope all satisfy the designator"

# --- The oracle ---

[req.CHECK-COVERAGE]
kind = "functional"
statement = "Every functional requirement needs a cited satisfier and every requirement a cited verifier"

[req.CHECK-RESOLVE]
kind = "functional"
statement = "Every cited path must resolve to a real item in the tree"

[req.CHECK-SEAL]
kind = "functional"
statement = "A recorded seal that no longer matches its content fails the check"

[req.CHECK-LIVE]
kind = "functional"
statement = "A cited verifier must be a live, non-ignored test"

[req.CHECK-ORPHAN]
kind = "functional"
statement = "An annotation citing a label absent from the manifest is reported as an orphan"

[req.CHECK-KIND]
kind = "functional"
statement = "A satisfies citation on an invariant requirement is a kind violation"
